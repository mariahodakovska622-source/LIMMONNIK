<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lemon Chat 2.0</title>
    <style>
        /* 1. ОБЩИЕ СТИЛИ */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; display: flex; height: 100vh; 
            background: #0a0a0a; color: #f1f1f1; overflow: hidden; 
        }

        /* 2. ЛОАДЕР */
        #loader { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; z-index: 9999; transition: opacity 0.5s; 
        }
        .loader-logo { font-size: 70px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1.15); } 50% { transform: scale(1); } }
        .loader-hidden { opacity: 0; pointer-events: none; }

        /* 3. ОВЕРЛЕИ */
        #auth-overlay, #profile-overlay, #view-profile-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            z-index: 5000; display: flex; justify-content: center; align-items: center; 
            backdrop-filter: blur(8px);
        }
        #profile-overlay, #view-profile-overlay { display: none; z-index: 6000; }

        .auth-card, .profile-card { 
            background: #1a1a1a; padding: 30px; border-radius: 24px; 
            border: 1px solid #D4E157; width: 340px; text-align: center; 
            box-shadow: 0 10px 40px rgba(212, 225, 87, 0.1);
        }
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; 
            border: 1px solid #333; background: #252525; color: white; 
            box-sizing: border-box; outline: none; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: #D4E157; background: #2a2a2a; }
        
        .auth-btn-group { display: flex; gap: 10px; }
        button { cursor: pointer; border-radius: 12px; border: none; font-weight: bold; transition: 0.2s; }
        #btn-login, #save-profile { flex: 1; padding: 14px; background: #D4E157; color: #000; }
        #btn-reg, #close-profile, #close-view-profile { flex: 1; padding: 14px; background: #333; color: #D4E157; border: 1px solid #D4E157; }
        button:active { transform: scale(0.95); }

        /* 4. БОКОВАЯ ПАНЕЛЬ */
        .sidebar { width: 280px; background: #111; border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; }
        .status-dot { width: 8px; height: 8px; background: #D4E157; border-radius: 50%; display: inline-block; margin-right: 8px; }

        /* Анимация появления результата поиска */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 5. ОСНОВНОЙ КОНТЕЙНЕР ЧАТА */
        #chat-container { flex: 1; display: flex; flex-direction: column; background: #0f0f0f; position: relative; }
        #chat-header { padding: 15px 25px; background: #161616; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        #chat-header h4 { margin: 0; color: #D4E157; font-weight: 500; letter-spacing: 1px; }

        #typing-display { 
            height: 25px; padding: 0 25px; font-size: 12px; color: #D4E157; 
            font-style: italic; display: flex; align-items: center; opacity: 0.8;
        }

        /* 6. СООБЩЕНИЯ */
        #messages { flex: 1; overflow-y: auto; padding: 20px 25px; list-style: none; display: flex; flex-direction: column; gap: 15px; }
        #messages li { max-width: 75%; animation: appear 0.3s ease; display: flex; align-items: flex-end; gap: 12px; }
        
        .avatar-wrapper { position: relative; flex-shrink: 0; }
        .status-online { 
            position: absolute; bottom: 2px; right: 2px; width: 10px; height: 10px; 
            background: #3dcc30; border: 2px solid #111; border-radius: 50%; 
        }

        @keyframes appear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .my { align-self: flex-end; flex-direction: row-reverse; }
        .my .msg-body { background: #D4E157; color: #000; border-radius: 18px 18px 4px 18px; padding: 12px 18px; box-shadow: 0 4px 15px rgba(212, 225, 87, 0.1); }

        .other { align-self: flex-start; }
        .other .msg-body { background: #1e1e1e; border: 1px solid #333; border-radius: 18px 18px 18px 4px; padding: 12px 18px; }
        .msg-avatar-click { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #D4E157; cursor: pointer; object-fit: cover; }

        /* 7. ФОРМА */
        #form { padding: 20px; display: flex; gap: 12px; background: #161616; border-top: 1px solid #222; }
        #input { flex: 1; padding: 14px 20px; border-radius: 12px; border: 1px solid #333; background: #252525; color: white; outline: none; }
        #send-btn { background: #D4E157; width: 55px; font-size: 18px; color: #000; }

        /* ПРОФИЛЬ */
        #profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #D4E157; object-fit: cover; }
        .info-row { text-align: left; background: #222; padding: 10px 15px; border-radius: 12px; margin-bottom: 10px; font-size: 13px; border: 1px solid #333; }
        .info-row b { color: #D4E157; }

        /* МЕНЮ */
        #menu-content { display: none; position: absolute; right: 0; top: 40px; background: #1a1a1a; min-width: 190px; border-radius: 12px; border: 1px solid #333; overflow: hidden; z-index: 1001; }
        #menu-content.show { display: block; }
        #menu-content a { display: block; padding: 12px 20px; color: #eee; text-decoration: none; font-size: 14px; transition: 0.2s; }
        #menu-content a:hover { background: #D4E157; color: #000; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">🍋</div>
        <p style="color: #D4E157; letter-spacing: 3px; font-size: 12px; margin-top: 10px;">LIMONNIK ЧАТ</p>
    </div>

    <div id="auth-overlay">
        <div class="auth-card">
            <h2 style="color: #D4E157; margin-bottom: 5px;">🍋 LIMONNIK</h2>
            <p style="font-size: 12px; opacity: 0.5; margin-bottom: 20px;">Добро пожаловать в сад</p>
            <input type="text" id="auth-user" placeholder="Ваше имя">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <div class="auth-btn-group">
                <button id="btn-login">ВОЙТИ</button>
                <button id="btn-reg">РЕГИСТРАЦИЯ</button>
            </div>
        </div>
    </div>

    <div id="profile-overlay">
        <div class="profile-card">
            <h3 style="color: #D4E157; margin-bottom: 20px;">👤 Настройка профиля</h3>
            <div class="profile-pic-container" onclick="document.getElementById('file-input').click()" style="position: relative; display: inline-block; cursor: pointer; margin-bottom: 15px;">
                <img id="profile-pic" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                <div style="font-size: 10px; margin-top: 5px; opacity: 0.6;">Сменить аватар</div>
                <input type="file" id="file-input" accept="image/*" style="display: none;">
            </div>
            <input type="text" id="prof-bio" placeholder="Пару слов о себе">
            <input type="date" id="prof-birth" title="Дата рождения">
            <select id="prof-status">
                <option value="Не указано">Семейное положение</option>
                <option value="🍋 возле детского садика">🍋 возле детского садика</option>
                <option value="❤️ сирота">❤️ сирота</option>
                <option value="🤔 хуна жизн">🤔 хуна жизн</option>
                <option value="🍋 Актив">🍋 Актив</option>
            </select>
            <div class="auth-btn-group">
                <button id="save-profile">СОХРАНИТЬ</button>
                <button id="close-profile">ЗАКРЫТЬ</button>
            </div>
        </div>
    </div>

    <div id="view-profile-overlay">
        <div class="profile-card">
            <div class="avatar-wrapper" style="margin-bottom: 15px;">
                <img id="view-ava" src="" style="width: 110px; height: 110px; border-radius: 50%; border: 3px solid #D4E157; object-fit: cover;">
                <span class="status-online" style="width: 15px; height: 15px; bottom: 8px; right: 8px;"></span>
            </div>
            <h2 id="view-name" style="color: #D4E157; margin-bottom: 20px;"></h2>
            <div class="info-row"><b>🎈 ДР:</b> <span id="view-birth"></span></div>
            <div class="info-row"><b>💍 Статус:</b> <span id="view-status"></span></div>
            <div class="info-row"><b>📝 О себе:</b> <span id="view-bio"></span></div>
            <button id="close-view-profile" style="width: 100%; margin-top: 10px;">ПОНЯТНО</button>
        </div>
    </div>

    <div class="sidebar">
        <h3 style="color: #D4E157; margin-top: 0; font-size: 22px;">🍋 LIMONNIK</h3>
        
        <div style="margin-top: 10px;">
            <input type="text" id="search-user" placeholder="Найти лимонного..." 
                   style="width: 100%; padding: 12px; border-radius: 12px; background: #1a1a1a; border: 1px solid #333; color: white; margin-bottom: 5px;">
            <div id="search-results" style="min-height: 20px;"></div>
        </div>

        <div style="margin-top: 25px;">
            <p style="font-size: 14px; color: #D4E157; margin-bottom: 15px;"><span class="status-dot"></span>Общий чат</p>
            <div id="my-mini-status" style="font-size: 11px; opacity: 0.5; margin-left: 15px;">Ожидание входа...</div>
        </div>

        <div style="flex-grow: 1;"></div>
        
        <div style="background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333;">
            <p style="font-size: 11px; color: #D4E157; margin: 0;">Версия: 2.0.4 PRAJM</p>
            <p style="font-size: 9px; opacity: 0.3; margin-top: 5px;">Сделано с кислинкой 🍋</p>
        </div>
    </div>

    <main id="chat-container">
        <header id="chat-header">
            <div style="display: flex; align-items: center;">
                <h4>ГЛАВНАЯ</h4>
                <span id="typing-status" style="margin-left: 15px; font-size: 11px; opacity: 0.7;"></span>
            </div>
            <div class="menu-container">
                <button id="menu-btn">⋮</button>
                <div id="menu-content">
                    <a href="#" id="open-profile">📂 Мой профиль</a>
                    <a href="#" id="clear-chat">🗑️ Очистить чат</a>
                    <hr style="border: 0; border-top: 1px solid #333; margin: 0;">
                    <a href="#" id="logout">🚪 Выйти</a>
                </div>
            </div>
        </header>

        <ul id="messages"></ul>

        <div id="typing-display"></div>

        <form id="form">
            <input id="input" autocomplete="off" placeholder="Написать сообщение...">
            <button id="send-btn" type="submit">></button>
        </form>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
